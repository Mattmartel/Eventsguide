<style>
  :root { --accent: #D20000; --type-scale: 1; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #fff; color: var(--text-strong); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }
  img, video { display: block; max-width: 100%; }
  a { color: inherit; }

  .fac-root { --ts: var(--type-scale, 1); --accent: var(--accent, #D20000); }

  /* shells */
  .fac-shell { max-width: 1180px; margin: 0 auto; padding-left: 24px; padding-right: 24px; }
  .fac-shell-wide { max-width: 1320px; margin: 0 auto; padding: 0 32px; }
  .fac-col { max-width: 752px; margin: 0 auto; padding: 40px 24px 8px; }
  .fac-col > * + * { margin-top: 30px; }
  .fac-block-gap { margin-top: 40px; }

  /* MREC ad band — full width within the editorial column */
  .fac-mrec { display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 26px 0; border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); }
  .fac-ad-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-muted); margin-bottom: 8px; text-align: center; }
  .fac-mrec image-slot { background: var(--surface-cool); }

  /* ===== FREE listing specifics ===== */
  .free-flag { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 6px 0 2px; }
  .free-flag-tag { font-family: var(--font-sans); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
    font-size: 11px; color: var(--text-strong); background: var(--surface-cool); border: 1px solid var(--border-medium);
    padding: 5px 10px; }
  .free-flag-note { font-size: 13px; color: var(--text-muted); }
  .free-intro .free-trunc-note { margin-top: 6px; }
  .free-intro p:first-child { position: relative; }

  /* locked premium teasers */
  .free-locked-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .free-locked { position: relative; display: block; text-decoration: none; color: inherit;
    border: 1px dashed var(--border-medium); background: var(--surface-cool); padding: 26px 24px; }
  .free-locked:hover { border-color: var(--accent); background: #fff; }
  .free-locked-icon { color: var(--text-muted); margin-bottom: 12px; }
  .free-locked:hover .free-locked-icon { color: var(--accent); }
  .free-locked-title { font-family: var(--font-heading); font-weight: 650; font-size: calc(19px * var(--ts)); margin: 0; }
  .free-locked-desc { font-family: var(--font-body-serif); font-size: calc(14.5px * var(--ts)); line-height: 1.5;
    color: var(--text-body); margin: 8px 0 14px; }
  .free-locked-tag { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-sans);
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10.5px; color: var(--accent); }

  .free-contact-note { font-size: 13px; color: var(--text-muted); margin: 14px 0 0; font-style: italic; }

  /* owner upgrade banner */
  .free-owner { background: #000; color: #fff; margin-top: 64px; }
  .free-owner-inner { max-width: 1180px; margin: 0 auto; padding: 48px 24px; display: grid;
    grid-template-columns: 1.5fr 1fr; gap: 48px; align-items: center; }
  .free-owner-copy .fac-h2 { color: #fff; margin-top: 6px; }
  .free-owner-lead { font-family: var(--font-body-serif); font-size: calc(17px * var(--ts)); line-height: 1.55;
    color: rgba(255,255,255,.82); margin: 12px 0 18px; max-width: 60ch; }
  .free-owner-perks { list-style: none; margin: 0 0 24px; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 24px; }
  .free-owner-perks li { display: flex; gap: 9px; align-items: flex-start; font-size: calc(14.5px * var(--ts)); line-height: 1.4; color: rgba(255,255,255,.92); }
  .free-perk-ic { color: var(--accent); flex: 0 0 auto; margin-top: 1px; }
  .free-owner-actions { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .free-owner-preview { color: #fff; font-weight: 600; font-size: 14px; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,.4); }
  .free-owner-preview:hover { border-bottom-color: #fff; }
  .free-owner-card { border: 1px solid rgba(255,255,255,.25); padding: 26px 24px; }
  .free-owner-card-tag { display: inline-block; background: var(--accent); color: #fff; font-family: var(--font-sans);
    font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; font-size: 11px; padding: 5px 11px; margin-bottom: 18px; }
  .free-owner-card-rows { display: grid; gap: 16px; }
  .free-owner-card-rows > div { display: flex; align-items: baseline; gap: 10px; border-bottom: 1px solid rgba(255,255,255,.16); padding-bottom: 12px; }
  .free-owner-card-rows strong { font-family: var(--font-heading); font-weight: 650; font-size: calc(22px * var(--ts)); color: #fff; }
  .free-owner-card-rows span { font-size: 13px; color: rgba(255,255,255,.6); text-transform: uppercase; letter-spacing: 0.05em; }

  @media (max-width: 680px) {
    .free-locked-grid { grid-template-columns: 1fr; }
    .free-owner-inner { grid-template-columns: 1fr; gap: 28px; }
    .free-owner-perks { grid-template-columns: 1fr; }
  }

  /* typography */
  .fac-h1 { font-family: var(--font-heading); font-weight: 650; line-height: 1.06; letter-spacing: -0.015em;
    font-size: calc(46px * var(--ts)); margin: 0; color: var(--text-strong); text-wrap: balance; }
  .fac-h1.on-dark { color: #fff; }
  .fac-h2 { font-family: var(--font-heading); font-weight: 650; line-height: 1.12; letter-spacing: -0.01em;
    font-size: calc(30px * var(--ts)); margin: 0; text-wrap: balance; }
  .fac-h3 { font-family: var(--font-heading); font-weight: 650; line-height: 1.15;
    font-size: calc(21px * var(--ts)); margin: 0; }
  .fac-kicker { font-family: var(--font-sans); font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.09em; font-size: calc(12px * var(--ts)); color: var(--accent); display: inline-block; }
  .fac-standfirst { font-family: var(--font-body-serif); font-size: calc(20px * var(--ts)); line-height: 1.5;
    color: var(--text-body); margin: 16px 0 0; max-width: 44ch; text-wrap: pretty; }
  .fac-standfirst.on-dark { color: rgba(255,255,255,.92); }

  .fac-link { color: var(--accent); text-decoration: none; border-bottom: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); }
  .fac-link:hover { border-bottom-color: var(--accent); }

  /* breadcrumb */
  .fac-crumb { padding: 18px 0 2px; font-size: 13px; color: var(--text-muted); display: flex; gap: 9px; align-items: center; flex-wrap: wrap; }
  .fac-crumb a { text-decoration: none; color: var(--text-muted); }
  .fac-crumb a:hover { color: var(--accent); }
  .fac-crumb [aria-current] { color: var(--text-strong); font-weight: 600; }
  .fac-crumb-sep { color: rgba(0,0,0,.3); }

  /* section head */
  .fac-sec-head { border-top: 1px solid var(--border-soft); padding-top: 26px; }
  .fac-sec-head .fac-kicker { margin-bottom: 8px; }
  .fac-sec-lead { font-family: var(--font-body-serif); font-size: calc(17px * var(--ts)); color: var(--text-body);
    line-height: 1.55; margin: 12px 0 0; max-width: 60ch; }

  /* hero — overlay */
  .fac-hero.is-overlay { position: relative; min-height: 470px; display: flex; align-items: flex-end; background: #151515; overflow: hidden; }
  .fac-hero.is-overlay.is-tall { min-height: 640px; }
  .fac-hero-bg { position: absolute; inset: 0; background: #151515; }
  .fac-hero-bg image-slot { width: 100%; height: 100%; }
  .fac-hero-scrim { position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.45) 40%, rgba(0,0,0,.08) 78%, rgba(0,0,0,0) 100%); }
  .fac-hero-overlay-content { position: relative; z-index: 2; width: 100%; max-width: 1180px; margin: 0 auto;
    padding: 48px 24px; color: #fff; pointer-events: none; }
  .fac-hero-overlay-content .fac-kicker { margin-bottom: 14px; pointer-events: auto; }
  .fac-hero-overlay-content .fac-h1 { max-width: 18ch; }

  /* hero — split */
  .fac-hero.is-split { max-width: 1180px; margin: 0 auto; padding: 40px 24px 14px;
    display: grid; grid-template-columns: 1.05fr 0.95fr; gap: 46px; align-items: center; }
  .fac-hero-text .fac-kicker { margin-bottom: 14px; }
  .fac-hero-media { aspect-ratio: 4 / 3; background: var(--surface-cool); }
  .fac-hero-actions { margin-top: 26px; }

  /* sponsor credit */
  .fac-sponsor-credit { display: inline-flex; align-items: center; gap: 11px; margin-top: 22px;
    padding-top: 16px; border-top: 1px solid var(--border-soft); pointer-events: auto; }
  .fac-sponsor-credit.is-invert { border-top-color: rgba(255,255,255,.25); }
  .fac-sponsor-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600;
    color: var(--text-muted); }
  .is-invert .fac-sponsor-label { color: rgba(255,255,255,.7); }
  .fac-sponsor-logo { display: inline-block; width: 110px; height: 32px; }
  .fac-sponsor-logo.sm { width: 96px; height: 26px; }

  /* stat band */
  .fac-statband { display: grid; grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid #000; border-bottom: 1px solid var(--border-soft); }
  .fac-stat { padding: 22px 18px; border-left: 1px solid var(--border-soft); }
  .fac-stat:first-child { border-left: none; }
  .fac-stat-value { font-family: var(--font-heading); font-weight: 650; font-size: calc(40px * var(--ts)); line-height: 1; letter-spacing: -0.01em; }
  .fac-stat-label { font-size: calc(12.5px * var(--ts)); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-top: 9px; font-weight: 600; }
  .fac-statband.is-dark { background: #000; border-color: #000; }
  .fac-statband.is-dark .fac-stat { border-left-color: rgba(255,255,255,.16); }
  .fac-statband.is-dark .fac-stat-value { color: #fff; }
  .fac-statband.is-dark .fac-stat-label { color: rgba(255,255,255,.6); }

  /* intro / prose */
  .fac-intro p { font-family: var(--font-body-serif); font-size: calc(18px * var(--ts)); line-height: 1.7;
    color: var(--text-body); margin: 0 0 18px; text-wrap: pretty; }
  .fac-intro.is-large p { font-size: calc(21px * var(--ts)); line-height: 1.6; }
  .fac-intro.is-large p:first-child { color: var(--text-strong); }

  /* at a glance */
  .fac-glance { border-top: 2px solid #000; padding-top: 16px; }
  .fac-glance .fac-kicker { color: var(--text-strong); }
  .fac-glance-list { margin: 12px 0 0; padding: 0; }
  .fac-glance-row { display: flex; justify-content: space-between; gap: 18px; padding: 11px 0;
    border-bottom: 1px solid var(--border-soft); }
  .fac-glance-row dt { font-size: calc(13.5px * var(--ts)); color: var(--text-muted); font-weight: 600; flex: 0 0 auto; }
  .fac-glance-row dd { margin: 0; font-size: calc(14px * var(--ts)); text-align: right; font-weight: 500; }

  /* capacity table */
  .fac-table-wrap { overflow-x: auto; }
  .fac-table { width: 100%; border-collapse: collapse; font-size: calc(14.5px * var(--ts)); }
  .fac-table th, .fac-table td { padding: 13px 14px; text-align: center; border-bottom: 1px solid var(--border-soft); white-space: nowrap; }
  .fac-table thead th { font-family: var(--font-sans); font-size: calc(12px * var(--ts)); text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-muted); border-bottom: 2px solid var(--accent); font-weight: 700; }
  .fac-table th.al, .fac-table td.al { text-align: left; }
  .fac-table tbody th.al { font-family: var(--font-heading); font-weight: 650; font-size: calc(15.5px * var(--ts)); }
  .fac-table tbody tr:hover { background: var(--surface-cool); }
  .fac-table-note { font-size: calc(12.5px * var(--ts)); color: var(--text-muted); margin: 12px 0 0; }

  /* spaces list */
  .fac-spaces { display: grid; gap: 0; }
  .fac-space { padding: 20px 0; border-bottom: 1px solid var(--border-soft); }
  .fac-space:first-child { border-top: 1px solid var(--border-soft); }
  .fac-space-head { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; }
  .fac-space-area { font-size: calc(13px * var(--ts)); font-weight: 600; color: var(--accent); white-space: nowrap; }
  .fac-space-blurb { font-family: var(--font-body-serif); font-size: calc(16px * var(--ts)); line-height: 1.6;
    color: var(--text-body); margin: 8px 0 0; max-width: 70ch; }

  /* detail blocks */
  .fac-detail-grid { display: grid; gap: 30px 40px; }
  .fac-detail-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .fac-detail-grid.cols-1 { grid-template-columns: 1fr; }
  .fac-detail-body { font-family: var(--font-body-serif); font-size: calc(16px * var(--ts)); line-height: 1.62;
    color: var(--text-body); margin: 10px 0 0; }
  .fac-detail.is-card { border: 1px solid var(--border-medium); padding: 24px; background: #fff; }
  .fac-checklist { list-style: none; margin: 14px 0 0; padding: 0; display: grid; gap: 9px; }
  .fac-checklist li { display: flex; gap: 10px; align-items: flex-start; font-size: calc(14.5px * var(--ts)); line-height: 1.45; }
  .fac-check-ic { color: var(--accent); flex: 0 0 auto; margin-top: 1px; }
  .fac-check-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin-top: 7px; flex: 0 0 auto; }

  /* gallery */
  .fac-gallery { display: grid; gap: 12px; }
  .fac-gallery-cell { position: relative; background: var(--surface-cool); }
  .fac-gallery.is-strip { grid-template-columns: repeat(3, 1fr); }
  .fac-gallery.is-strip .fac-gallery-cell { aspect-ratio: 4 / 3; }
  .fac-gallery.is-grid { grid-template-columns: repeat(3, 1fr); }
  .fac-gallery.is-grid .fac-gallery-cell { aspect-ratio: 4 / 3; }
  .fac-gallery.is-mosaic { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 158px; }
  .fac-gallery.is-mosaic .c1 { grid-column: span 2; grid-row: span 2; }
  .fac-gallery.is-mosaic .c2 { grid-column: span 2; }
  .fac-gallery.is-mosaic .c5 { grid-column: span 2; }
  .fac-gallery.is-mosaic .c6 { grid-column: span 2; }

  /* video */
  .fac-video { margin: 0; }
  .fac-video-frame { position: relative; aspect-ratio: 16 / 9; background: #000; }
  .fac-video-frame video { width: 100%; height: 100%; object-fit: cover; }
  .fac-video-cap { font-size: calc(13px * var(--ts)); color: var(--text-muted); margin-top: 10px; font-style: italic; font-family: var(--font-body-serif); }

  /* pricing */
  .fac-price-list { margin: 14px 0 0; padding: 0; }
  .fac-price-row { display: flex; justify-content: space-between; gap: 18px; padding: 12px 0; border-bottom: 1px solid var(--border-soft); }
  .fac-price-row:first-child { border-top: 1px solid var(--border-soft); }
  .fac-price-row dt { font-weight: 600; font-size: calc(15px * var(--ts)); }
  .fac-price-row dd { margin: 0; font-size: calc(15px * var(--ts)); color: var(--accent); font-weight: 650; font-family: var(--font-heading); }

  /* enquiry CTA */
  .fac-cta.is-card { border: 1px solid #000; padding: 28px; background: var(--surface-cool); }
  .fac-cta.is-card .fac-h3 { margin-top: 8px; }
  .fac-cta.is-card .fac-detail-body { margin-bottom: 20px; }
  .fac-cta-alt { font-size: calc(13.5px * var(--ts)); color: var(--text-muted); margin: 14px 0 0; text-align: center; }
  .fac-accent-btn { background-color: var(--accent) !important; border-color: var(--accent) !important; color: #fff !important; }
  .fac-accent-btn:hover { filter: brightness(0.92); }

  /* contact */
  .fac-contact .fac-kicker { color: var(--text-strong); }
  .fac-contact .fac-glance-list { margin-top: 10px; }

  /* quote */
  .fac-quote { margin: 0; border-left: 3px solid var(--accent); padding: 4px 0 4px 24px; }
  .fac-quote p { font-family: var(--font-heading); font-weight: 500; font-size: calc(24px * var(--ts)); line-height: 1.3;
    margin: 0; color: var(--text-strong); text-wrap: balance; }
  .fac-quote cite { display: block; margin-top: 14px; font-style: normal; font-size: calc(13px * var(--ts));
    color: var(--text-muted); font-family: var(--font-sans); }

  /* spec sheet grid */
  .fac-grid-main { display: grid; grid-template-columns: 1fr 340px; gap: 52px; padding-top: 36px; padding-bottom: 8px; }
  .fac-main > * + * { margin-top: 32px; }
  .fac-aside { position: relative; }
  .fac-sticky { position: sticky; top: 20px; display: grid; gap: 28px; }

  /* showcase */
  .fac-shell-wide { padding-top: 40px; }
  .fac-shell-wide > * + * { margin-top: 44px; }
  .fac-show-lead { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start; }
  .fac-show-foot { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }

  /* sponsor strip */
  .fac-sponsor-strip { display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 16px 24px; margin-top: 0; border-bottom: 1px solid var(--border-soft); background: var(--surface-light);
    position: sticky; top: 0; z-index: 60; }
  .fac-sponsor-strip.is-branded { background: #0E6E78; color: #fff; padding: 0; margin-top: 0; border: none; }
  .fac-sponsor-strip-inner { max-width: 1180px; margin: 0 auto; width: 100%; padding: 22px 24px;
    display: grid; grid-template-columns: auto 1fr auto; gap: 28px; align-items: center; }
  .fac-sponsor-strip-logo { width: 128px; height: 44px; background: rgba(255,255,255,.12); }
  .fac-sponsor-strip-copy .fac-kicker { color: rgba(255,255,255,.85); }
  .fac-sponsor-strip-copy p { margin: 8px 0 0; font-size: calc(15px * var(--ts)); line-height: 1.5; color: rgba(255,255,255,.92);
    font-family: var(--font-body-serif); max-width: 60ch; }

  /* responsive */
  @media (max-width: 980px) {
    .fac-grid-main { grid-template-columns: 1fr; gap: 36px; }
    .fac-sticky { position: static; }
    .fac-show-lead, .fac-show-foot { grid-template-columns: 1fr; gap: 28px; }
    .fac-hero.is-split { grid-template-columns: 1fr; gap: 26px; }
  }
  @media (max-width: 680px) {
    .fac-statband { grid-template-columns: repeat(2, 1fr); }
    .fac-stat:nth-child(3) { border-left: none; }
    .fac-gallery.is-strip, .fac-gallery.is-grid { grid-template-columns: repeat(2, 1fr); }
    .fac-gallery.is-mosaic { grid-template-columns: repeat(2, 1fr); grid-auto-rows: 130px; }
    .fac-gallery.is-mosaic .c1 { grid-column: span 2; }
    .fac-detail-grid.cols-2 { grid-template-columns: 1fr; }
    .fac-sponsor-strip-inner { grid-template-columns: 1fr; text-align: left; }
    .fac-h1 { font-size: calc(34px * var(--ts)); }
  }
</style>
</head>
